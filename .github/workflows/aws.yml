name: Production Deploy - Frontend & Backend to ECS
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  AWS_REGION: eu-west-2
  ACCOUNT_ID: 127214197057

  FRONTEND_ECR: frontend
  BACKEND_ECR: backend

  ECS_CLUSTER: practice-ecs-cluster
  FRONTEND_SERVICE: frontend-service
  BACKEND_SERVICE: backend-service

permissions:
  id-token: write
  contents: read
  security-events: write

# ---------------------------
# JOB 1: SECURITY SCAN (SAST)
# ---------------------------
jobs:
  security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
          # config: |
          #   disable-incremental-analysis: true

      - name: Autobuild
        uses:  github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

# ---------------------------
# JOB 2: BUILD & PUSH IMAGES
# ---------------------------
  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: security
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_IAM }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------- FRONTEND ----------------
      - name: Build Frontend Image
        run: |
          docker build -t $FRONTEND_ECR ./frontend
          docker tag $FRONTEND_ECR:latest ${{ steps.login-ecr.outputs.registry }}/$FRONTEND_ECR:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/$FRONTEND_ECR:${{ github.sha }}

      # ---------------- BACKEND ----------------
      - name: Build Backend Image
        run: |
          docker build -t $BACKEND_ECR ./backend
          docker tag $BACKEND_ECR:latest ${{ steps.login-ecr.outputs.registry }}/$BACKEND_ECR:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/$BACKEND_ECR:${{ github.sha }}

# ---------------------------
# JOB 3: APPROVAL GATE
# ---------------------------
  approve:
    name: Manual Approval (Production Gate)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Approval Step
        run: echo "Approved by production reviewer"

# ---------------------------
# JOB 4: DEPLOY TO ECS
# ---------------------------
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: approve
    environment: production

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_IAM }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Frontend Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --force-new-deployment

      - name: Deploy Backend Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE \
            --force-new-deployment

# ---------------------------
# JOB 5: NOTIFICATIONS
# ---------------------------
  notify:
    name: SNS Notification
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    if: always()

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_IAM }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send Success Notification
        if: success()
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_TOPIC_ARN }} \
            --subject "Deployment SUCCESS" \
            --message "
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: SUCCESS
            "

      - name: Send Failure Notification
        if: failure()
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_TOPIC_ARN }} \
            --subject "Deployment FAILED" \
            --message "
            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: FAILED
            "